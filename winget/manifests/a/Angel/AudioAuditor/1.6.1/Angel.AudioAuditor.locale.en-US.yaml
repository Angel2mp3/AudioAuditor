ShortDescription: Desktop audio quality analyzer — detect fake lossless, clipping, MQA, AI-generated audio, and more
Description: |-
  AudioAuditor is a feature-rich desktop application for Windows that analyzes audio files to detect
  fake lossless, verify true quality, identify clipping, detect MQA encoding, detect AI-generated audio,
  estimate effective frequency cutoffs, and more. Includes a built-in audio player with loop modes,
  seek tooltip, equalizer, spatial audio, spectrogram viewer, real-time visualizer, synced lyrics,
  Now Playing panel, and themeable interface.
