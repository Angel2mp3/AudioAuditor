ShortDescription: Professional audio quality analysis and verification for your music library
Description: |-
  AudioAuditor analyzes your audio files to detect fake lossless, verify true quality,
  identify clipping, detect MQA encoding, detect AI-generated audio, estimate effective
  frequency cutoffs, and much more. Includes a built-in audio player, 10-band equalizer,
  spatial audio, spectrogram viewer, real-time visualizer, full metadata editor, Discord
  Rich Presence, Last.fm scrobbling, 10 fully customizable themes, an immersive Now Playing
  panel with synced lyrics, karaoke mode, lyric translation, and album color-matched theming.
